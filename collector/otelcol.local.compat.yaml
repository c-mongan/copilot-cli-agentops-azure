receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4318
      grpc:
        endpoint: 127.0.0.1:4317

extensions:
  health_check:
    endpoint: 127.0.0.1:13133

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
  transform/content_capture_signal:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["agentops.content_capture.signal"], true) where attributes["content.capture.enabled"] == true or attributes["gen_ai.input.messages"] != nil or attributes["gen_ai.output.messages"] != nil or attributes["gen_ai.prompt"] != nil or attributes["gen_ai.completion"] != nil or attributes["gen_ai.tool.call.arguments"] != nil or attributes["gen_ai.tool.call.result"] != nil or attributes["github.copilot.message"] != nil
    log_statements:
      - context: log
        statements:
          - set(attributes["agentops.content_capture.signal"], true) where attributes["content.capture.enabled"] == true or attributes["gen_ai.input.messages"] != nil or attributes["gen_ai.output.messages"] != nil or attributes["gen_ai.prompt"] != nil or attributes["gen_ai.completion"] != nil or attributes["gen_ai.tool.call.arguments"] != nil or attributes["gen_ai.tool.call.result"] != nil or attributes["github.copilot.message"] != nil
  attributes/privacy_safe:
    actions:
      # - key: gen_ai.system_instructions
      #   action: delete
      # - key: gen_ai.input.messages
      #   action: delete
      # - key: gen_ai.output.messages
      #   action: delete
      # - key: gen_ai.prompt
      #   action: delete
      # - key: gen_ai.completion
      #   action: delete
      # - key: gen_ai.tool.input
      #   action: delete
      # - key: gen_ai.tool.output
      #   action: delete
      # - key: gen_ai.tool.call.arguments
      #   action: delete
      # - key: gen_ai.tool.call.result
      #   action: delete
      # - key: github.copilot.message
      #   action: delete
      - key: code.filepath
        action: hash
      - key: url.full
        action: delete
      - key: http.request.body.content
        action: delete
      - key: http.response.body.content
        action: delete
  batch: {}

exporters:
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform/content_capture_signal, attributes/privacy_safe, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, transform/content_capture_signal, attributes/privacy_safe, batch]
      exporters: [debug]
