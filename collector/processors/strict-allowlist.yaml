# AgentOps strict privacy allowlist fragment.
# This is a source-controlled contract for the collector configs generated in
# collector/otelcol.*.strict.yaml. Keep it metadata-only.
processors:
  transform/privacy_strict:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - keep_keys(attributes, ["service.name", "service.namespace", "service.version", "telemetry.sdk.name", "telemetry.sdk.language", "telemetry.sdk.version", "agent.framework", "agent.runtime", "agentops.profile", "agentops.experiment", "agentops.e2e.id", "agentops.pack.version", "agentops.repo.hash", "agentops.branch.hash", "agentops.workspace.hash", "agentops.surface", "agentops.privacy.mode", "agentops.content_capture.mode", "agentops.content_capture.signal", "agentops.poison_id"])
      - context: span
        statements:
          - keep_keys(attributes, ["agentops.schema.version", "agentops.run.id", "agentops.session.id", "agentops.surface", "agentops.privacy.mode", "agentops.content_capture.mode", "agentops.content_capture.signal", "agentops.repo.hash", "agentops.branch.hash", "agentops.workspace.hash", "agentops.command.hash", "agentops.task.type", "agentops.agent.name", "agentops.skill.name", "agentops.model.requested", "agentops.model.actual", "agentops.outcome.status", "agentops.outcome.reason", "agentops.duration.ms", "agentops.error.type", "agentops.retry.count", "agentops.tools.count", "agentops.tools.failed_count", "agentops.tools.denied_count", "agentops.tests.ran", "agentops.tests.passed", "agentops.tests.command_hash", "agentops.files.read_count", "agentops.files.edited_count", "agentops.files.sensitive_touched", "agentops.pr.opened", "agentops.pr.number_hash", "agentops.ci.status", "agentops.cost.estimated_usd", "agentops.risk.score", "agentops.eval.overall", "gen_ai.operation.name", "gen_ai.provider.name", "gen_ai.conversation.id", "gen_ai.request.model", "gen_ai.response.model", "gen_ai.usage.input_tokens", "gen_ai.usage.output_tokens", "gen_ai.usage.reasoning.output_tokens", "gen_ai.tool.name", "mcp.method.name", "mcp.session.id", "mcp.transport", "mcp.server.name", "mcp.client.name", "error.type", "server.address", "http.status_code", "agentops.poison_id"])
      - context: spanevent
        statements:
          - keep_keys(attributes, ["agentops.content_capture.signal", "agentops.run.id", "agentops.session.id", "agentops.poison_id", "gen_ai.operation.name", "gen_ai.tool.name", "mcp.method.name", "error.type", "exception.type"])
