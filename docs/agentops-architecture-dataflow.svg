<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Copilot AgentOps For Azure Architecture And Data Flow</title>
  <desc id="desc">A layered architecture diagram showing Copilot CLI, the local AgentOps wrapper, OpenTelemetry Collector, Azure Monitor, Log Analytics, Grafana, CLI, plugin agents, hooks, skills, MCP, benchmarks, alerts, and feedback loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#fffdf8"/>
    </linearGradient>
    <linearGradient id="localBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#edf8f4"/>
    </linearGradient>
    <linearGradient id="cloudBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#fff5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1c2a39" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#047857"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .band-label { font: 700 18px Arial, Helvetica, sans-serif; fill: #10233f; letter-spacing: 0; }
      .box-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-text { font: 400 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, Helvetica, sans-serif; fill: #475569; }
      .tag { font: 700 11px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .line-blue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrowBlue); }
      .line-green { fill: none; stroke: #047857; stroke-width: 3; marker-end: url(#arrowGreen); }
      .line-amber { fill: none; stroke: #b45309; stroke-width: 3; marker-end: url(#arrowAmber); }
      .line-red { fill: none; stroke: #b91c1c; stroke-width: 3; marker-end: url(#arrowRed); }
      .line-muted { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 7; }
      .lane { fill-opacity: 0.78; stroke: #cbd5e1; stroke-width: 1.2; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
      .box-blue { fill: #f8fbff; stroke: #93c5fd; }
      .box-green { fill: #f7fefb; stroke: #86efac; }
      .box-amber { fill: #fffaf1; stroke: #fbbf24; }
      .box-red { fill: #fff7f7; stroke: #fca5a5; }
      .box-purple { fill: #fbf9ff; stroke: #c4b5fd; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="url(#bg)"/>

  <text x="60" y="60" class="title">Copilot AgentOps For Azure</text>
  <text x="60" y="88" class="subtitle">Metadata-first Copilot CLI observability, MCP-assisted investigation, and benchmark-backed improvement loops</text>

  <rect x="50" y="120" width="1500" height="270" rx="18" fill="url(#localBand)" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="75" y="152" class="band-label">Local Copilot Runtime</text>

  <rect x="50" y="420" width="1500" height="275" rx="18" fill="#ffffff" fill-opacity="0.72" stroke="#d6d3d1" stroke-width="1.5"/>
  <text x="75" y="452" class="band-label">AgentOps Product Surface</text>

  <rect x="50" y="725" width="1500" height="250" rx="18" fill="url(#cloudBand)" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="75" y="758" class="band-label">Azure Observability Backend</text>

  <!-- Local runtime row -->
  <rect x="85" y="185" width="205" height="105" rx="10" class="box box-blue"/>
  <text x="105" y="216" class="box-title">Copilot User</text>
  <text x="105" y="240" class="box-text">Runs plain copilot</text>
  <text x="105" y="260" class="box-text">or copilot-agentops</text>
  <rect x="105" y="270" width="84" height="20" rx="10" fill="#2563eb"/>
  <text x="119" y="284" class="tag">native path</text>

  <rect x="345" y="185" width="220" height="105" rx="10" class="box box-blue"/>
  <text x="365" y="216" class="box-title">Shadow Shim</text>
  <text x="365" y="240" class="box-text">~/.local/bin/copilot</text>
  <text x="365" y="260" class="box-text">sets COPILOT_CLI_BIN</text>
  <text x="365" y="280" class="tiny">prevents recursive wrapper calls</text>

  <rect x="625" y="165" width="250" height="145" rx="10" class="box box-green"/>
  <text x="645" y="196" class="box-title">AgentOps Wrapper</text>
  <text x="645" y="220" class="box-text">scripts/copilot-agentops</text>
  <text x="645" y="240" class="box-text">starts/verifies collector</text>
  <text x="645" y="260" class="box-text">falls back if setup fails</text>
  <text x="645" y="280" class="tiny">does not block normal Copilot use</text>

  <rect x="935" y="165" width="270" height="145" rx="10" class="box box-green"/>
  <text x="955" y="196" class="box-title">copilot-observe</text>
  <text x="955" y="220" class="box-text">enables Copilot OTel</text>
  <text x="955" y="240" class="box-text">content capture = false</text>
  <text x="955" y="260" class="box-text">adds run labels and counts</text>
  <text x="955" y="280" class="tiny">repo hash, model, mode, MCP, policy posture</text>

  <rect x="1280" y="185" width="220" height="105" rx="10" class="box box-blue"/>
  <text x="1300" y="216" class="box-title">Real Copilot CLI</text>
  <text x="1300" y="240" class="box-text">invoke_agent, chat,</text>
  <text x="1300" y="260" class="box-text">execute_tool spans</text>
  <text x="1300" y="280" class="tiny">GenAI and github.copilot fields</text>

  <rect x="665" y="325" width="330" height="45" rx="10" class="box box-amber"/>
  <text x="687" y="353" class="box-title">Local OTel Collector on 127.0.0.1:4318 / 4317</text>

  <path d="M290 238 L345 238" class="line-blue"/>
  <path d="M565 238 L625 238" class="line-blue"/>
  <path d="M875 238 L935 238" class="line-green"/>
  <path d="M1205 238 L1280 238" class="line-green"/>
  <path d="M1390 290 C1390 350 1070 348 1000 348" class="line-blue"/>
  <text x="1125" y="337" class="tiny">OTLP spans/logs</text>
  <path d="M750 310 L750 325" class="line-amber"/>
  <text x="775" y="323" class="tiny">collector bootstrap</text>

  <!-- Product surface row -->
  <rect x="85" y="490" width="245" height="145" rx="10" class="box box-green"/>
  <text x="105" y="521" class="box-title">AgentOps CLI</text>
  <text x="105" y="545" class="box-text">latest, live, replay</text>
  <text x="105" y="565" class="box-text">explain, recommend, link</text>
  <text x="105" y="585" class="box-text">fields, policy, mcp, lineage</text>
  <text x="105" y="605" class="box-text">benchmark gates</text>

  <rect x="390" y="490" width="250" height="145" rx="10" class="box box-purple"/>
  <text x="410" y="521" class="box-title">Plugin Agents</text>
  <text x="410" y="545" class="box-text">telemetry investigator</text>
  <text x="410" y="565" class="box-text">agent optimizer</text>
  <text x="410" y="585" class="box-text">skill doctor</text>
  <text x="410" y="605" class="box-text">hook reviewer, subagent architect</text>

  <rect x="700" y="490" width="235" height="145" rx="10" class="box box-amber"/>
  <text x="720" y="521" class="box-title">Hooks And Skills</text>
  <text x="720" y="545" class="box-text">preToolUse policy</text>
  <text x="720" y="565" class="box-text">failure hints</text>
  <text x="720" y="585" class="box-text">setup, triage, dashboard ops</text>
  <text x="720" y="605" class="box-text">benchmark, MCP, lineage skills</text>

  <rect x="995" y="490" width="235" height="145" rx="10" class="box box-blue"/>
  <text x="1015" y="521" class="box-title">Grafana UI</text>
  <text x="1015" y="545" class="box-text">sessions, details, traces</text>
  <text x="1015" y="565" class="box-text">tools/MCP, runtime events</text>
  <text x="1015" y="585" class="box-text">safety, quality, evals</text>
  <text x="1015" y="605" class="tiny">dashboard pack today</text>

  <rect x="1290" y="490" width="210" height="145" rx="10" class="box box-red"/>
  <text x="1310" y="521" class="box-title">Eval And Policy</text>
  <text x="1310" y="545" class="box-text">benchmark report/compare</text>
  <text x="1310" y="565" class="box-text">forbidden files</text>
  <text x="1310" y="585" class="box-text">content-capture detector</text>
  <text x="1310" y="605" class="box-text">proposal-only alerts</text>

  <path d="M208 490 C210 455 650 445 792 370" class="line-green"/>
  <text x="340" y="458" class="tiny">CLI queries Azure or fixtures</text>
  <path d="M515 490 C535 438 685 410 790 370" class="line-green"/>
  <text x="540" y="424" class="tiny">agents ask for evidence</text>
  <path d="M817 490 C810 442 805 410 815 370" class="line-amber"/>
  <text x="832" y="432" class="tiny">hook events and policy signals</text>

  <!-- Cloud row -->
  <rect x="85" y="805" width="255" height="115" rx="10" class="box box-amber"/>
  <text x="105" y="836" class="box-title">Application Insights</text>
  <text x="105" y="860" class="box-text">Azure Monitor exporter</text>
  <text x="105" y="880" class="box-text">workspace-based component</text>
  <text x="105" y="900" class="tiny">connection string fetched at runtime</text>

  <rect x="410" y="805" width="285" height="115" rx="10" class="box box-blue"/>
  <text x="430" y="836" class="box-title">Log Analytics</text>
  <text x="430" y="860" class="box-text">AppDependencies</text>
  <text x="430" y="880" class="box-text">AppTraces and AppEvents</text>
  <text x="430" y="900" class="tiny">KQL sessionization and token rollups</text>

  <rect x="765" y="805" width="260" height="115" rx="10" class="box box-blue"/>
  <text x="785" y="836" class="box-title">Azure Managed Grafana</text>
  <text x="785" y="860" class="box-text">12 dashboard pack</text>
  <text x="785" y="880" class="box-text">session-first drilldowns</text>
  <text x="785" y="900" class="tiny">imports through az grafana</text>

  <rect x="1095" y="805" width="210" height="115" rx="10" class="box box-red"/>
  <text x="1115" y="836" class="box-title">Alert Rules</text>
  <text x="1115" y="860" class="box-text">high AIU</text>
  <text x="1115" y="880" class="box-text">failed spans</text>
  <text x="1115" y="900" class="box-text">content capture</text>

  <rect x="1365" y="805" width="135" height="115" rx="10" class="box box-red"/>
  <text x="1385" y="836" class="box-title">Actioner</text>
  <text x="1385" y="860" class="box-text">future</text>
  <text x="1385" y="880" class="box-text">deterministic</text>
  <text x="1385" y="900" class="box-text">notifications</text>

  <path d="M830 370 C830 690 215 675 215 805" class="line-amber"/>
  <text x="300" y="715" class="tiny">privacy-filtered telemetry export</text>
  <path d="M340 862 L410 862" class="line-blue"/>
  <path d="M695 862 L765 862" class="line-blue"/>
  <path d="M1025 862 L1095 862" class="line-red"/>
  <path d="M1305 862 L1365 862" class="line-red"/>

  <path d="M552 805 C530 710 245 690 210 635" class="line-green"/>
  <text x="330" y="710" class="tiny">az monitor log-analytics query</text>

  <path d="M895 805 C900 720 1090 685 1110 635" class="line-blue"/>
  <text x="930" y="713" class="tiny">dashboard panels and links</text>

  <path d="M555 805 C595 690 520 650 518 635" class="line-green"/>
  <text x="565" y="680" class="tiny">read-only Azure MCP</text>

  <path d="M895 805 C825 690 645 650 520 635" class="line-green"/>
  <text x="680" y="660" class="tiny">Grafana MCP context</text>

  <path d="M1395 635 C1435 705 1428 760 1430 805" class="line-red"/>
  <text x="1285" y="705" class="tiny">eval and alert evidence</text>

  <!-- Feedback loop -->
  <path d="M1375 490 C1430 390 1370 330 1235 310" class="line-red"/>
  <text x="1250" y="398" class="tiny">benchmark labels and safety gates</text>

  <path d="M515 490 C465 360 570 265 625 245" class="line-green"/>
  <text x="440" y="348" class="tiny">agent proposes minimal improvement</text>

  <path d="M700 565 C650 705 1220 710 1198 805" class="line-red"/>
  <text x="760" y="692" class="tiny">policy and hook evidence into governance</text>

  <!-- Legend -->
  <rect x="60" y="995" width="1480" height="34" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="90" cy="1012" r="6" fill="#2563eb"/>
  <text x="105" y="1016" class="tiny">telemetry/query/data flow</text>
  <circle cx="275" cy="1012" r="6" fill="#047857"/>
  <text x="290" y="1016" class="tiny">Copilot-native investigation loop</text>
  <circle cx="520" cy="1012" r="6" fill="#b45309"/>
  <text x="535" y="1016" class="tiny">collector/export path</text>
  <circle cx="700" cy="1012" r="6" fill="#b91c1c"/>
  <text x="715" y="1016" class="tiny">policy, eval, alert, and safety loop</text>
  <text x="1030" y="1016" class="tiny">Status: strong metadata-first scaffold; needs setup wizard, richer UI, eval anti-cheat, and collector health for world-class product.</text>
</svg>
